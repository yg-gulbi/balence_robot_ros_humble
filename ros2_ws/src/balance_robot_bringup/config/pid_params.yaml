/**:
  ros__parameters:
    # ── Balance (inner) PID ──────────────────────────────────
    # Input:  tilt angle theta [rad]
    # Output: linear velocity  [m/s]
    balance_kp:  2.0
    balance_ki:  0.05
    balance_kd:  0.3

    # ── Velocity (outer) PID ─────────────────────────────────
    # Input:  cmd_vel error [m/s]
    # Output: tilt setpoint [rad]
    vel_kp:  0.5
    vel_ki:  0.05
    vel_kd:  0.01

    # ── Limits ───────────────────────────────────────────────
    theta_max:      0.35   # [rad] safety cutoff (~20 deg)
    max_vel:        1.5    # [m/s] max wheel velocity
    vel_theta_max:  0.12   # [rad] max tilt setpoint from vel loop
    wheel_radius:   0.05   # [m]
