controller_manager:
  ros__parameters:
    update_rate: 1000  # Hz — matches physics step rate

    # Register controllers
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    left_wheel_effort_controller:
      type: effort_controllers/JointGroupEffortController

    right_wheel_effort_controller:
      type: effort_controllers/JointGroupEffortController

# Joint state broadcaster (publishes /joint_states)
joint_state_broadcaster:
  ros__parameters:
    joints:
      - left_wheel_joint
      - right_wheel_joint

# Effort controllers for each wheel
left_wheel_effort_controller:
  ros__parameters:
    joints:
      - left_wheel_joint

right_wheel_effort_controller:
  ros__parameters:
    joints:
      - right_wheel_joint
